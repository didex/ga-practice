name: Real CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # 🔹 Ручной запуск из UI GitHub

env:
  CI_ENV: "production"
  APP_VERSION: "1.0.0"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: "production"

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npm test
        env:
          TEST_MODE: "ci"
